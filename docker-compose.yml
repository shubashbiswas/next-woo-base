# ═══════════════════════════════════════════════════════════
#  Docker Compose — Headless WordPress + Next.js
# ═══════════════════════════════════════════════════════════
#
# ⚠️  WARNING: This configuration is for LOCAL DEVELOPMENT ONLY.
#    Default passwords are hardcoded for convenience. NEVER deploy
#    this configuration to production without changing ALL passwords.
#
# Production checklist:
#   - Set strong MYSQL_ROOT_PASSWORD, MYSQL_PASSWORD
#   - Set strong WORDPRESS_WEBHOOK_SECRET
#   - Set WC_CONSUMER_KEY and WC_CONSUMER_SECRET
#   - Remove DISALLOW_FILE_MODS or set to false if you need plugin updates
#   - Use a reverse proxy (Nginx/Caddy) with HTTPS termination
#   - Restrict MySQL port (3307) to internal network only
#
# Usage:
#   docker compose up -d                    # Start everything
#   docker compose logs -f                  # Follow logs
#   docker compose down                     # Stop everything
#   docker compose down -v                  # Stop + delete volumes
# ═══════════════════════════════════════════════════════════

name: next-woo

services:

  # ─── Database ────────────────────────────────────────────
  # WordPress 7.0 requires MySQL 8.0+ or MariaDB 10.9+
  mysql:
    image: mariadb:11.4
    container_name: next-woo-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nextwp}
      MYSQL_USER: ${MYSQL_USER:-nextwp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nextwp}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── WordPress ───────────────────────────────────────────
  # WordPress 7.0: Best performance with PHP 8.3+ and MySQL 8.0+ / MariaDB 10.11+
  wordpress:
    image: wordpress:7.0-php8.3-apache
    container_name: next-woo-wordpress
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: ${MYSQL_USER:-nextwp}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-nextwp}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-nextwp}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://localhost:8080');
        define('WP_SITEURL', 'http://localhost:8080');
        define('WP_POST_REVISIONS', 5);
        define('WP_AUTO_UPDATE_CORE', false);
        define('DISALLOW_FILE_MODS', true);
    volumes:
      - wordpress_data:/var/www/html
      - ./wordpress/next-revalidate:/var/www/html/wp-content/plugins/next-revalidate
      - ./wordpress/theme:/var/www/html/wp-content/themes/next-woo
    ports:
      - "8080:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost/wp-admin/install.php || exit 0"
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Next.js ─────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WORDPRESS_URL: ${WORDPRESS_URL:-http://localhost:8080}
        WORDPRESS_HOSTNAME: ${WORDPRESS_HOSTNAME:-localhost}
        WORDPRESS_WEBHOOK_SECRET: ${WORDPRESS_WEBHOOK_SECRET:-dev-secret-do-not-use-in-prod}
        ISR_CACHE_TTL: ${ISR_CACHE_TTL:-3600}
    container_name: next-woo-nextjs
    restart: unless-stopped
    depends_on:
      wordpress:
        condition: service_started
    environment:
      WORDPRESS_URL: ${WORDPRESS_URL:-http://wordpress:80}
      WORDPRESS_HOSTNAME: ${WORDPRESS_HOSTNAME:-localhost}
      WORDPRESS_WEBHOOK_SECRET: ${WORDPRESS_WEBHOOK_SECRET:-dev-secret-do-not-use-in-prod}
      ISR_CACHE_TTL: ${ISR_CACHE_TTL:-3600}
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  mysql_data:
    name: next-woo-mysql-data
  wordpress_data:
    name: next-woo-wordpress-data